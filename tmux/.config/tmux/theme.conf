# Show window tabs in a top status bar
set -g status on
set -g status-position top
set -g status-interval 2

# Shiny violet/green/orange theme
set -g status-style "bg=#16131f,fg=#e9defa"
set -g message-style "bg=#ff9f1c,fg=#1b1300,bold"
set -g mode-style "bg=#7c3aed,fg=#ffffff,bold"
set -g pane-border-style "fg=#3b2f52"
set -g pane-active-border-style "fg=#22d3a6"

# Rounded/pill-like tab styling
setw -g window-status-separator ""
setw -g window-status-style "bg=#16131f,fg=#b9aacd"
setw -g window-status-format " #[fg=#7c3aed,bg=#16131f]#[fg=#efe9ff,bg=#7c3aed] #I #[fg=#d8c8ef]#W #[fg=#7c3aed,bg=#16131f]"
setw -g window-status-current-format " #[fg=#22d3a6,bg=#16131f]#[fg=#0b211a,bg=#22d3a6,bold] #I #[fg=#123f32,bold]#W #[fg=#22d3a6,bg=#16131f]"

# Right side modules (session + clock) using orange accents
set -g status-left-length 60
set -g status-right-length 100
set -g status-left "#[fg=#ff9f1c,bg=#16131f]#[fg=#2a1600,bg=#ff9f1c,bold] #S #[fg=#ff9f1c,bg=#16131f] "
set -g status-right " #[fg=#7c3aed,bg=#16131f]#[fg=#efe9ff,bg=#7c3aed] %a %d %b #[fg=#7c3aed,bg=#16131f] #[fg=#ff9f1c,bg=#16131f]#[fg=#2a1600,bg=#ff9f1c,bold] %H:%M #[fg=#ff9f1c,bg=#16131f]"
