# Escape-time to avoid conflicts with NeoVim
set-option -sg escape-time 10
set -g allow-passthrough on
set -g set-clipboard on

# VIM bindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-l resize-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# reload config file
bind r source-file ~/.config/tmux/tmux.conf

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Common quality-of-life settings
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
setw -g automatic-rename on
set -g monitor-activity on
set -g visual-activity off
setw -g mode-keys vi

# Custom theme (violet + orange)
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1f1333,fg=#f4eaff"
set -g message-style "bg=#ff8c42,fg=#1f1333"
set -g message-command-style "bg=#ff8c42,fg=#1f1333"

set -g pane-border-style "fg=#5b3f8c"
set -g pane-active-border-style "fg=#b07cff"

setw -g window-status-format "#[fg=#5b3f8c,bg=#1f1333]#[fg=#d3c2ff,bg=#2b1a47] #I:#W #[fg=#5b3f8c,bg=#1f1333]"
setw -g window-status-current-format "#[fg=#ff8c42,bg=#1f1333]#[fg=#1f1333,bg=#ff8c42,bold] #I:#W #[fg=#ff8c42,bg=#1f1333]"
setw -g window-status-separator " "

set -g status-left-length 60
set -g status-right-length 100
set -g status-left "#[fg=#1f1333,bg=#b07cff,bold] #S #[fg=#b07cff,bg=#1f1333]"
set -g status-right "#[fg=#ff8c42,bg=#1f1333]#[fg=#1f1333,bg=#ff8c42,bold] %Y-%m-%d %H:%M #[fg=#ff8c42,bg=#1f1333]"
